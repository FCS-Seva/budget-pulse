services:
  postgres:
    image: postgres:16-alpine
    container_name: budgetpulse-postgres
    environment:
      POSTGRES_DB: budgetpulse
      POSTGRES_USER: budgetpulse
      POSTGRES_PASSWORD: budgetpulse
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U budgetpulse -d budgetpulse"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2.10-alpine
    container_name: budgetpulse-nats
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data

volumes:
  postgres_data:
  nats_data: